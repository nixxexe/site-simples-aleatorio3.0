<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste de formularios</title>
</head>
<body>
    <h2>elementos de um formulario</h2>

    <form action="" method="post">
        Nome: <input type="text" name="nome"><br>

        Senha: <input type="password" name="senha"><br>

        <hr>

         melhor dia de semana? <br>

        <input type="radio" name="dia" value="segunda" checked> segunda<br>

        <input type="radio" name="dia" value="terça"> terça<br>

        <input type="radio" name="dia" value="quarta"> quarta<br>

        <input type="radio" name="dia" value="quinta"> quinta<br>

        <input type="radio" name="dia" value="sexta"> sexta

        <hr>

        Escolha suas materias favoritas<br>

        <input type="checkbox" name="esporte1" value="portugues">portugues<br>

        <input type="checkbox" name="esporte2" value="matematica">matematica<br>

        <input type="checkbox" name="esporte3" value="E.F">E.F<br>

        <input type="checkbox" name="esporte4" value="ciencias">ciencias<br>

        <input type="checkbox" name="esporte5" value="historia">historia<br>

        <input type="checkbox" name="esporte6" value="artes">artes<br>

        <input type="checkbox" name="esporte7" value="geografia">geografia<br>

        <input type="checkbox" name="esporte8" value="ingles">ingles<br>
    </form>
</body>
</html>
